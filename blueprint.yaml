blueprint:
  name: Track Train by Schedule (AM & PM) – REST Command v7
  description: >
    Queries RTT station departures to find a specific train by time/destination.
    Supports multiple backup trains (comma-separated times), conditional detailed lookups,
    and notification preferences (only on issues, include train identity, platform changes).
    
    Requires rest_commands in configuration.yaml (rtt_service is optional):
    rtt_search:
      url: "https://data.rtt.io/gb-nr/location?code={{ origin }}&filterTo={{ destination }}&timeFrom={{ date }}T{{ '%02d' | format((time | int / 100) | int) }}:{{ '%02d' | format(time | int % 100) }}:00"
      headers:
        Authorization: "Bearer !secret rtt_token"
    rtt_service:
      url: "https://data.rtt.io/gb-nr/service?identity={{ uid }}&departureDate={{ date }}"
      headers:
        Authorization: "Bearer !secret rtt_token" 
  domain: automation

  input:
    days:
      name: Days of Week
      description: "Automation only runs on these days"
      selector:
        select:
          multiple: true
          mode: list
          options:
            - Monday
            - Tuesday
            - Wednesday
            - Thursday
            - Friday
            - Saturday
            - Sunday

    morning_station:
      name: Morning Origin Station (CRS)
      description: "Where you board (e.g., BKH)"
      selector:
        text: {}

    morning_destination:
      name: Morning Destination Station (CRS)
      description: "Where the train is going (e.g., CST)"
      selector:
        text: {}

    morning_scheduled:
      name: Morning Scheduled Time(s) (HHMM)
      description: "Comma-separated list of times to check in order (e.g., 0730,0745,0800). Will report on first available train."
      selector:
        text: {}

    morning_trigger_time:
      name: Morning Check Time
      description: "When to run the check (e.g., 07:20)"
      selector:
        time: {}

    evening_station:
      name: Evening Origin Station (CRS)
      description: "Where you board (e.g., CST)"
      selector:
        text: {}

    evening_destination:
      name: Evening Destination Station (CRS)
      description: "Where the train is going (e.g., BKH)"
      selector:
        text: {}

    evening_scheduled:
      name: Evening Scheduled Time(s) (HHMM)
      description: "Comma-separated list of times to check in order (e.g., 1717,1722,1730). Will report on first available train."
      selector:
        text: {}

    evening_trigger_time:
      name: Evening Check Time
      description: "When to run the check (e.g., 16:50)"
      selector:
        time: {}

    notify_device:
      name: Send Notifications To
      selector:
        device:
          filter:
            - integration: mobile_app

    notify_only_on_issues:
      name: Notify Only On Issues
      description: "If enabled, only send notifications for cancellations, delays, or platform changes. Suppress 'on time' messages."
      default: false
      selector:
        boolean: {}

    fetch_detailed_info:
      name: Fetch Detailed Service Info
      description: "If enabled, makes an additional API call to get full calling pattern. Only needed for advanced use cases."
      default: false
      selector:
        boolean: {}

trigger:
  - platform: time
    at: !input morning_trigger_time
    id: morning

  - platform: time
    at: !input evening_trigger_time
    id: evening

condition:
  - condition: template
    value_template: >
      {% set days = days_input %}
      {{ now().strftime('%A') in days }}

variables:
  days_input: !input days
  notify_device: !input notify_device
  notify_only_on_issues: !input notify_only_on_issues
  fetch_detailed_info: !input fetch_detailed_info
  
  # Inputs
  morning_origin: !input morning_station
  morning_dest: !input morning_destination
  morning_times_raw: !input morning_scheduled
  
  evening_origin: !input evening_station
  evening_dest: !input evening_destination
  evening_times_raw: !input evening_scheduled

  # Parse comma-separated times into lists
  morning_times: >
    {% set times = morning_times_raw.split(',') %}
    {{ times | map('trim') | map('replace', ':', '') | list }}
  
  evening_times: >
    {% set times = evening_times_raw.split(',') %}
    {{ times | map('trim') | map('replace', ':', '') | list }}

  # Determine search parameters based on trigger
  search_origin: >
    {{ morning_origin if trigger.id == 'morning' else evening_origin }}
  
  search_dest: >
    {{ morning_dest if trigger.id == 'morning' else evening_dest }}
    
  search_times: >
    {{ morning_times if trigger.id == 'morning' else evening_times }}

  today: "{{ now().strftime('%Y-%m-%d') }}"

action:
  # 1. Search for the first scheduled time
  - service: rest_command.rtt_search
    data:
      origin: "{{ search_origin }}"
      destination: "{{ search_dest }}"
      date: "{{ today }}"
      time: "{{ search_times[0] }}"
    response_variable: search_response

  - variables:
      search_data: "{{ search_response.content | from_json if search_response.content is string else search_response.content }}"
      
      # Find first matching service from the user's list
      found_service_json: >
        {% set ns = namespace(res='null') %}
        {% if search_data.services is defined %}
          {% for t in search_times %}
            {% for s in search_data.services %}
              {% set s_time_raw = s.temporalData.departure.scheduleAdvertised | default(s.temporalData.departure.scheduleInternal | default('')) %}
              {% set s_time = s_time_raw | string %}
              {% set hourmin = '' %}
              {% if s_time | length >= 16 %}
                {% set hourmin = s_time[11:13] ~ s_time[14:16] %}
              {% elif s_time | length >= 4 %}
                {% set hourmin = s_time[-4:] %}
              {% endif %}
              {% if hourmin != '' and hourmin == (t | string) %}
                {% set ns.res = s | to_json %}
                {% break %}
              {% endif %}
            {% endfor %}
            {% if ns.res != 'null' %}{% break %}{% endif %}
          {% endfor %}
        {% endif %}
        {{ ns.res }}

      train_data: "{{ found_service_json | from_json if found_service_json != 'null' else none }}"

  # 2. If no train found, notify and stop
  - if:
      - condition: template
        value_template: "{{ train_data is none }}"
    then:
      - domain: mobile_app
        type: notify
        device_id: !input notify_device
        message: >
          {% if search_data is none %}
            ❌ API Error: Empty response from RTT
          {% elif search_data.systemStatus is defined and search_data.systemStatus.rttCore != 'OK' %}
            ❌ API Error: RTT Core Status {{ search_data.systemStatus.rttCore }}
          {% else %}
            ❓ Could not find trains from {{ search_origin }} to {{ search_dest }} at {{ search_times | join(', ') }}.
          {% endif %}
      - stop: "No matching service found"

  # 3. Extract details
  - variables:
      sched_meta: "{{ train_data.scheduleMetadata | default({}) }}"
      temp_data: "{{ train_data.temporalData | default({}) }}"
      loc_meta: "{{ train_data.locationMetadata | default({}) }}"
      
      uid: "{{ sched_meta.identity | default('') }}"
      id: "{{ sched_meta.trainReportingIdentity | default('N/A') }}"
      run_date: "{{ sched_meta.departureDate | default('') }}"
      
      # Status
      is_cancelled: "{{ temp_data.displayAs == 'CANCELLED' or (temp_data.departure is defined and temp_data.departure.isCancelled == true) }}"
      
      platform_actual: "{{ loc_meta.platform.actual if loc_meta.platform is defined else '' }}"
      platform_planned: "{{ loc_meta.platform.planned if loc_meta.platform is defined else '' }}"
      platform: "{{ platform_actual if platform_actual != '' else (platform_planned if platform_planned != '' else '—') }}"
      platform_changed: "{{ platform_actual != '' and platform_planned != '' and platform_actual != platform_planned }}"
      
      cancel_reason: >
        {% set reason = (train_data.reasons | default([])) | selectattr('type', 'eq', 'CANCEL') | first | default(none) %}
        {{ reason.shortText if reason else 'Unknown' }}
      
      # Times & Delay
      sched: "{{ temp_data.departure.scheduleAdvertised | default(temp_data.departure.scheduleInternal | default('')) }}"
      actual: "{{ temp_data.departure.realtimeActual | default(temp_data.departure.realtimeEstimate | default('')) }}"
      
      sched_display: >
        {% set sched_s = sched | string %}
        {% if sched_s | length >= 16 %}
          {{ sched_s[11:16] }}
        {% elif sched_s | length >= 4 %}
          {{ sched_s[-4:-2] }}:{{ sched_s[-2:] }}
        {% elif sched_s %}
          {{ sched_s }}
        {% else %}
          Unknown
        {% endif %}
      actual_display: >
        {% set actual_s = actual | string %}
        {% if actual_s | length >= 16 %}
          {{ actual_s[11:16] }}
        {% elif actual_s | length >= 4 %}
          {{ actual_s[-4:-2] }}:{{ actual_s[-2:] }}
        {% elif actual_s %}
          {{ actual_s }}
        {% else %}
          Unknown
        {% endif %}
      
      delay_min: >
        {% if sched and actual %}
          {% set s = as_timestamp(sched) %}
          {% set a = as_timestamp(actual) %}
          {% if s and a %}
            {% set d = (a - s) / 60 %}
            {{ d | int }}
          {% else %}0{% endif %}
        {% else %}0{% endif %}

  # 4. Optional detailed info
  - if:
      - condition: template
        value_template: "{{ fetch_detailed_info }}"
    then:
      - service: rest_command.rtt_service
        data:
          uid: "{{ uid }}"
          date: "{{ run_date if run_date else today }}"
        response_variable: rtt_response

  # 5. Notify
  - choose:
      - conditions: "{{ is_cancelled }}"
        sequence:
          - domain: mobile_app
            type: notify
            device_id: !input notify_device
            message: >
              ❌ Train {{ sched_display }} ({{ id }}) is CANCELLED
              Reason: {{ cancel_reason }}

      - conditions: "{{ delay_min | int > 0 }}"
        sequence:
          - domain: mobile_app
            type: notify
            device_id: !input notify_device
            message: >
              ⚠️ Train {{ sched_display }} ({{ id }}) is DELAYED
              Expected: {{ actual_display }}
              Delay: {{ delay_min }} min
              Platform: {{ platform }}{% if platform_changed %} (⚠️ CHANGED){% endif %}

      - conditions: "{{ platform_changed and delay_min | int <= 0 and not is_cancelled }}"
        sequence:
          - domain: mobile_app
            type: notify
            device_id: !input notify_device
            message: >
              ⚠️ Train {{ sched_display }} ({{ id }}) - PLATFORM CHANGED
              New Platform: {{ platform }}
              Departure: {{ actual_display }}

    default:
      - if:
          - condition: template
            value_template: "{{ not notify_only_on_issues }}"
        then:
          - domain: mobile_app
            type: notify
            device_id: !input notify_device
            message: >
              ✅ Train {{ sched_display }} ({{ id }}) ON TIME
              Platform: {{ platform }}

mode: single
