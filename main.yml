  /api/info:
    get:
      tags:
        - api
      summary: Get info on version and credentials
      description: Provides information about the current API version and access credentials being used
      parameters:
        - $ref: '#/components/parameters/VersionHeader'
        - $ref: '#/components/parameters/VersionQuery'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_version:
                    type: string
                    description: Provides the current version of the API being presented
                    example: 2026-01-18
                  credentials:
                    type: object
                    properties:
                      entitlements:
                        $ref: '#/components/schemas/EntitlementList'
                      historyRestriction:
                        type: boolean
                        description: Indicates whether historical lookback restrictions are being placed on this API key
                        example: true
                      historyRestrictToDays:
                        type: integer
                        description: Indicates number of days that history is restricted to
                        null: true
                        example: 14
                        default: 14
                      namespaceRestriction:
                        type: boolean
                        description: Indicates whether this API key is restricted to certain namespaces
                        example: true
                      namespacesAvailable:
                        type: array
                        description: Lists the available namespaces to this API key if restricted
                        null: true
                        example:
                          - gb-nr

  /api/get_access_token:
    get:
      tags:
        - api
      summary: Provides an access token if the user only has a refresh token
      description: With a given refresh token provided as the bearer, the system returns a short life access token with the necessary entitlements
      parameters:
        - $ref: '#/components/parameters/VersionHeader'
        - $ref: '#/components/parameters/VersionQuery'
      responses:
        '200':
          description: An access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: Access token for use against remaining API calls
                  entitlements:
                    $ref: '#/components/schemas/EntitlementList'
                  validUntil:
                    type: string
                    format: date-time
                    description: Expiry time of this token
