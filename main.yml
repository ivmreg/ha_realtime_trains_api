      responses:
        '200':
          description: Returns the data for a service
          content:
            application/json:
              schema:
                type: object
                properties:
                  systemStatus:
                    $ref: '#/components/schemas/SystemStatus'
                  query:
                    type: object
                    properties:
                      uniqueIdentity:
                        type: string
